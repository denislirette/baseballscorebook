<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>◆ Scorecard</title>
  <meta name="description" content="Detailed SVG scorecard with pitch sequences, base paths, scoring notation, and pitcher stats for this MLB game.">
  <meta property="og:title" content="Game Scorecard - BaseballScorecard.org">
  <meta property="og:description" content="Detailed SVG scorecard with pitch sequences, base paths, scoring notation, and pitcher stats.">
  <meta property="og:type" content="website">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/favicon.svg">
  <link rel="manifest" href="/site.webmanifest">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/weather-icons/2.0.12/css/weather-icons.min.css">
  <script>
    if (localStorage.getItem('theme') === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
  </script>
</head>
<body>
  <header class="app-header">
    <a href="/" class="back-link">All Games</a>
    <h1 id="game-title">Loading...</h1>
    <button class="header-btn" id="theme-toggle" aria-label="Toggle dark mode"></button>
  </header>

  <div class="refresh-controls">
    <button class="header-btn" id="refresh-toggle" aria-pressed="false">Start</button>
    <label class="refresh-label">every
      <input type="number" id="refresh-interval" value="10" min="1" max="300" step="1" aria-label="Refresh interval">
      <select id="refresh-unit" aria-label="Refresh time unit">
        <option value="seconds" selected>seconds</option>
        <option value="minutes">minutes</option>
      </select>
    </label>
    <span id="refresh-status" aria-live="polite"></span>
  </div>

  <main id="scorecard-container" class="scorecard-container">
    <p class="loading">Loading game data...</p>
  </main>

  <script type="module" src="/js/nav.js"></script>
  <script type="module" src="/js/theme.js"></script>
  <script type="module" src="/js/scorecard.js"></script>
</body>
</html>
