  .controls {
    width: 360px; background: var(--surface, #fff); border-left: 1px solid var(--grid-line, #ddd);

  .controls h2 {
    font-size: 13px; text-transform: uppercase; letter-spacing: 0.05em;

    border-bottom: 1px solid var(--grid-line, #ddd); padding-bottom: 3px;
  }

    display: flex; align-items: center; gap: 8px; min-height: 28px;
  }
  .ctrl-row label {
    font-size: 12px; font-weight: 600; min-width: 100px; text-align: right;
    color: var(--text-secondary, #555);

  .ctrl-row input[type="number"] {
    width: 56px; font-size: 12px; font-family: "SF Mono", monospace;
    border: 1px solid var(--grid-line, #ccc); border-radius: 3px; padding: 2px 4px;

    flex: 1; font-size: 12px; font-family: "SF Mono", monospace;

// ─── Pitch helper ────────────────────────────────────────────────

function mkPitch(callCode, typeCode, pX, pZ, speed, szTop, szBot) {
  return {
    callCode, typeCode,
    pX: pX ?? null, pZ: pZ ?? null,
    speed: speed ?? null,
    szTop: szTop ?? 3.4, szBot: szBot ?? 1.6,
    challenged: false, challengeLabel: null, overturned: false,
  };
}

// ─── Build ab object from UI state ───────────────────────────────

function buildRunners() {
  const runners = [];
  const cumulativeRunners = [];
  const BATTER_ID = 100;
  let nextId = 200;

  function addRunner(playerId, start, destValue) {
    if (!destValue) return;
    const isOut = destValue.startsWith('out-');
    const end = isOut ? destValue.replace('out-', '') : destValue;
    if (end === start) return; // stays = no movement to draw

    runners.push({ playerId, start, end: end === 'score' ? 'score' : end, isOut });

    // Build cumulativeRunners with segments
    const order = ['HP', '1B', '2B', '3B'];
    const startIdx = order.indexOf(start);
    const endBase = end === 'score' ? 'HP' : end;
    const endIdx = order.indexOf(endBase);
    let numSegs;
    if (end === 'score') {
      numSegs = 4 - startIdx;
    } else if (endIdx > startIdx) {
      numSegs = endIdx - startIdx;
    } else {
      // Wrapping (e.g. 3B → HP for out at home)
      numSegs = (4 - startIdx) + endIdx;
      if (numSegs === 0) numSegs = 4;
    }
    if (numSegs <= 0) return;

    const segments = [];
    for (let n = 0; n < numSegs; n++) {
      const i = (startIdx + n) % 4;
      const isLastSeg = n === numSegs - 1;
      segments.push({
        from: order[i],
        to: order[(i + 1) % 4],
        isOutSegment: isOut && isLastSeg,
      });
    }

    const outNum = isOut ? parseInt(document.getElementById('outNumberSelect').value) || null : null;
    cumulativeRunners.push({
      playerId,
      segments,
      isOut,
      outNumber: outNum,
      outBase: isOut ? end : null,
    });
  }

  // Batter
  const batterDest = document.getElementById('batterDest').value;
  if (batterDest) addRunner(BATTER_ID, 'HP', batterDest);

  // Baserunners
  const r1b = document.getElementById('r1bDest').value;
  if (r1b) addRunner(nextId++, '1B', r1b);
  const r2b = document.getElementById('r2bDest').value;
  if (r2b) addRunner(nextId++, '2B', r2b);
  const r3b = document.getElementById('r3bDest').value;
  if (r3b) addRunner(nextId++, '3B', r3b);

  return { runners, cumulativeRunners, batterId: BATTER_ID };
}

function buildCurrentAb(scenario) {
  const { runners, cumulativeRunners, batterId } = buildRunners();
  const notation = document.getElementById('notationInput').value || scenario.notation || '';
  const eventType = document.getElementById('eventTypeSelect').value || scenario.eventType || '';
  const outNumber = parseInt(document.getElementById('outNumberSelect').value) || null;
  const rbi = parseInt(document.getElementById('rbiInput').value) || 0;

  return {
    batterId,
    pitchSequence: scenario.pitches || [],
    notation,
    runners,
    cumulativeRunners,
    result: { eventType },
    rbi,
    outNumber,
  };
}

const inputEls = {};

function buildControls() {
  for (const [containerId, defs] of Object.entries(CONTROL_DEFS)) {
    const container = document.getElementById(containerId);
    container.innerHTML = '';
    for (const def of defs) {
      const row = document.createElement('div');
      row.className = 'ctrl-row';

      const label = document.createElement('label');
      label.textContent = def.label;
      row.appendChild(label);

      const cfg = getConfig();
      const range = document.createElement('input');
      range.type = 'range';
      range.min = def.min; range.max = def.max; range.step = def.step;
      range.value = cfg[def.key];
      row.appendChild(range);

      const num = document.createElement('input');
      num.type = 'number';
      num.min = def.min; num.max = def.max; num.step = def.step;
      num.value = cfg[def.key];
      row.appendChild(num);

      inputEls[def.key] = { range, num };

      range.addEventListener('input', () => {
        const v = parseFloat(range.value);
        updateConfig({ [def.key]: v });
        num.value = v;
        refresh();
      });
      num.addEventListener('input', () => {
        const v = parseFloat(num.value);
        if (!isNaN(v)) {
          updateConfig({ [def.key]: v });
          range.value = v;
          refresh();
        }
      });

      container.appendChild(row);
    }
  }
}

function syncControlsFromConfig() {
  const cfg = getConfig();
  for (const [key, els] of Object.entries(inputEls)) {
    els.range.value = cfg[key];
    els.num.value = cfg[key];
  }
}

// ─── Build scenario select ──────────────────────────────────────

function buildScenarioSelect() {
  const sel = document.getElementById('scenarioSelect');
  sel.innerHTML = '';
  for (const name of Object.keys(SCENARIOS)) {
    const opt = document.createElement('option');
    opt.value = name; opt.textContent = name;
    if (name === currentScenarioName) opt.selected = true;
    sel.appendChild(opt);
  }
  sel.addEventListener('change', () => {
    currentScenarioName = sel.value;
    applyScenarioDefaults(SCENARIOS[currentScenarioName]);
    refresh();
  });
}

// ─── Render ──────────────────────────────────────────────────────

function renderCellSVG(forExport = false) {
  refreshLayout();
  const CLR = getColors();
  const cfg = getConfig();
  const W = cfg.COL_WIDTH;
  const H = cfg.ROW_HEIGHT;

  const scale = forExport ? 1 : SCALE;
  const svg = document.createElementNS(SVG_NS, 'svg');
  svg.setAttribute('xmlns', SVG_NS);
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.setAttribute('width', String(W * scale));
  svg.setAttribute('height', String(H * scale));
  if (!forExport) svg.setAttribute('class', 'cell-svg');

  // Cell background + border
  svg.appendChild(svgEl('rect', {
    x: 0, y: 0, width: W, height: H,
    fill: CLR.cellBg, stroke: CLR.gridBold, 'stroke-width': 2,
  }));

  // Build at-bat from scenario + UI overrides
  const scenario = SCENARIOS[currentScenarioName] || SCENARIOS['Empty Cell'];
  const ab = buildCurrentAb(scenario);

  // Draw at-bat cell content
  const g = svgEl('g');
  const hasPitcherBelow = document.getElementById('pitcherBelowCheck').checked;
  drawAtBatCell(g, CLR, ab, 0, 0, hasPitcherBelow);
  svg.appendChild(g);

  // Sub indicator
  const subType = document.getElementById('subTypeSelect').value;
  const subNum = parseInt(document.getElementById('subNumInput').value) || 0;
  if (subType) {
    const subG = svgEl('g');
    const pStats = subType === 'pitcher' ? { strikes: 42, pitches: 67, ks: 5 } : null;
    drawSubIndicator(subG, CLR, 0, 0, subType, subNum || null, pStats);
    svg.appendChild(subG);
  }

  return svg;
}

function refresh() {
  const container = document.getElementById('previewContainer');
  container.innerHTML = '';
  const svg = renderCellSVG(false);
  container.appendChild(svg);
}

// ─── Export SVG for Figma ────────────────────────────────────────

function exportSVG() {
  const svg = renderCellSVG(true);
  const serializer = new XMLSerializer();
  let svgString = serializer.serializeToString(svg);
  // Ensure XML declaration for Figma compatibility
  if (!svgString.startsWith('<?xml')) {
    svgString = '<?xml version="1.0" encoding="UTF-8"?>\n' + svgString;
  }
  navigator.clipboard.writeText(svgString).then(() => {
    document.getElementById('exportBox').textContent = 'SVG copied to clipboard! Paste into Figma.';
    document.getElementById('exportBox').style.color = '#16a34a';
    setTimeout(() => { document.getElementById('exportBox').style.color = ''; }, 3000);
  }).catch(() => {
    // Fallback: show in export box for manual copy
    document.getElementById('exportBox').textContent = svgString;
  });
}

function exportConfig() {
  const cfg = getConfig();
  const layoutKeys = Object.keys(DEFAULTS);
  let out = '// layout-config.js DEFAULTS\n';
  for (const k of layoutKeys) {
    const changed = cfg[k] !== DEFAULTS[k];
    out += `  ${k}: ${cfg[k]},${changed ? ' // changed' : ''}\n`;
  }
  document.getElementById('exportBox').textContent = out;
  navigator.clipboard.writeText(out).catch(() => {});
}

// ─── Zoom with scroll ───────────────────────────────────────────

document.getElementById('previewPane').addEventListener('wheel', (e) => {
  e.preventDefault();
  SCALE = Math.max(0.5, Math.min(5, SCALE + (e.deltaY > 0 ? -0.25 : 0.25)));
  document.getElementById('scaleBadge').textContent = `${SCALE}x`;
  refresh();
}, { passive: false });

// ─── Event listeners ─────────────────────────────────────────────

// All toggle inputs trigger refresh
for (const id of ['notationInput', 'eventTypeSelect', 'outNumberSelect', 'rbiInput',
  'batterDest', 'r1bDest', 'r2bDest', 'r3bDest',
  'subTypeSelect', 'subNumInput', 'pitcherBelowCheck']) {
  const el = document.getElementById(id);
  el.addEventListener('input', refresh);
  el.addEventListener('change', refresh);
}

document.getElementById('exportSvgBtn').addEventListener('click', exportSVG);
document.getElementById('exportConfigBtn').addEventListener('click', exportConfig);

document.getElementById('resetBtn').addEventListener('click', () => {
  resetConfig();
  syncControlsFromConfig();
  applyScenarioDefaults(SCENARIOS[currentScenarioName]);
  refresh();
});

// Theme toggle
document.getElementById('themeToggle').addEventListener('click', () => {
  const html = document.documentElement;
  if (html.getAttribute('data-theme') === 'dark') html.removeAttribute('data-theme');
  else html.setAttribute('data-theme', 'dark');
  setTimeout(refresh, 50);
});

// ─── Init ───────────────────────────────────────────────────────

buildControls();
buildScenarioSelect();
applyScenarioDefaults(SCENARIOS[currentScenarioName]);
refresh();

</script>
</body>
</html>
