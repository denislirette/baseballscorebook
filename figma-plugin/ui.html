<html>
<head>
<style>
  body { font-family: Inter, sans-serif; font-size: 13px; padding: 12px; margin: 0; background: #fff; }
  h2 { font-size: 14px; margin: 0 0 8px; }
  textarea { width: 100%; height: 200px; font-family: monospace; font-size: 11px; border: 1px solid #ccc; border-radius: 4px; padding: 8px; resize: vertical; box-sizing: border-box; }
  button { margin-top: 8px; padding: 8px 16px; background: #0066FF; color: white; border: none; border-radius: 4px; font-size: 13px; font-weight: 600; cursor: pointer; width: 100%; }
  button:hover { background: #0052CC; }
  .status { margin-top: 8px; font-size: 12px; color: #666; min-height: 16px; }
  .hint { font-size: 11px; color: #999; margin-bottom: 8px; }
</style>
</head>
<body>
  <h2>Import Scorecard Tokens</h2>
  <p class="hint">Paste design-tokens.json contents below, then click Import.</p>
  <textarea id="json" placeholder='Paste design-tokens.json here...'></textarea>
  <button id="import">Import Variables</button>
  <div class="status" id="status"></div>

  <script>
    document.getElementById('import').onclick = () => {
      const status = document.getElementById('status');
      const raw = document.getElementById('json').value.trim();
      if (!raw) { status.textContent = 'Paste JSON first.'; return; }
      try {
        const tokens = JSON.parse(raw);
        status.textContent = 'Importing...';
        parent.postMessage({ pluginMessage: { type: 'import', tokens } }, '*');
      } catch (e) {
        status.textContent = 'Invalid JSON: ' + e.message;
      }
    };

    window.onmessage = (e) => {
      const msg = e.data.pluginMessage;
      if (msg && msg.type === 'done') {
        document.getElementById('status').textContent = msg.message;
      }
    };
  </script>
</body>
</html>
