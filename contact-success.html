<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Message Sent - BaseballScorecard.org</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/css/style.css">
  <script>
    if (localStorage.getItem('theme') === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
  </script>
  <style>
    .success-page { max-width: 65ch; padding: 2em var(--container-pad) 4em; }
    .success-page p { line-height: 1.7; margin-bottom: 1em; }
  </style>
</head>
<body>
  <header class="app-header">
    <a href="/" class="back-link">All Games</a>
    <h1>Contact</h1>
    <button class="header-btn" id="theme-toggle" aria-label="Toggle dark mode"></button>
  </header>

  <main class="success-page">
    <h1>Message sent</h1>
    <p>Thanks for reaching out. I'll get back to you as soon as I can.</p>
    <p><a href="/">Back to Today's Games</a></p>
  </main>

  <script type="module" src="/js/nav.js"></script>
  <script type="module" src="/js/theme.js"></script>
</body>
</html>
